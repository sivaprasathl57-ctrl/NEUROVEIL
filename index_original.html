<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>National Cyber Crime Reporting Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy: #0a1628;
  --navy2: #112240;
  --blue: #1a56db;
  --blue2: #1e40af;
  --saffron: #FF6B00;
  --saffron2: #FF9500;
  --green: #138808;
  --white: #ffffff;
  --light: #f0f4ff;
  --muted: #94a3b8;
  --border: rgba(255,255,255,0.08);
  --card-bg: rgba(255,255,255,0.04);
  --glow: rgba(26,86,219,0.4);
  --saffron-glow: rgba(255,107,0,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Noto Sans',sans-serif;
  background:var(--navy);
  color:var(--white);
  overflow-x:hidden;
}

/* ───── TOP BAR ───── */
.topbar{
  background:var(--navy2);
  border-bottom:1px solid var(--border);
  padding:6px 40px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:12px;
  color:var(--muted);
}
.topbar-left{display:flex;align-items:center;gap:16px;}
.topbar-badge{
  background:rgba(26,86,219,0.15);
  border:1px solid rgba(26,86,219,0.3);
  color:#93c5fd;
  padding:2px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight:500;
}
.ai-thinking {
  position: relative;
  display: flex;
  align-items: center;
  gap: 10px;
  overflow: hidden;
  padding: 12px 16px;
  border-radius: 16px;
  background: linear-gradient(135deg, #0f172a, #1e3a8a, #312e81);
  box-shadow: 0 0 18px rgba(59, 130, 246, 0.45);
  color: white;
}

.ai-orb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: radial-gradient(circle, #67e8f9, #2563eb);
  box-shadow: 0 0 14px #38bdf8;
  animation: orbPulse 1.2s infinite ease-in-out;
}

.ai-text {
  font-size: 13px;
  letter-spacing: 0.3px;
  animation: textGlow 1.6s infinite ease-in-out;
}

.ai-text::after {
  content: "";
  animation: thinkingDots 1.4s infinite steps(4);
}

.ai-scan {
  position: absolute;
  top: 0;
  left: -60%;
  width: 50%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.25),
    transparent
  );
  animation: scanMove 1.8s infinite;
}

@keyframes orbPulse {
  0%, 100% {
    transform: scale(0.8);
    opacity: 0.6;
  }

  50% {
    transform: scale(1.25);
    opacity: 1;
  }
}

@keyframes textGlow {
  0%, 100% {
    opacity: 0.65;
  }

  50% {
    opacity: 1;
  }
}

@keyframes thinkingDots {
  0% {
    content: "";
  }

  25% {
    content: ".";
  }

  50% {
    content: "..";
  }

  75% {
    content: "...";
  }

  100% {
    content: "";
  }
}

@keyframes scanMove {
  0% {
    left: -60%;
  }

  100% {
    left: 120%;
  }
}
.emergency-btn{
  background:linear-gradient(135deg,#dc2626,#b91c1c);
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  border:none;
  animation:pulse-red 2s infinite;
}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.4);}50%{box-shadow:0 0 0 6px rgba(220,38,38,0);}}
