<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Standalone Complaint Form</title>
  <link rel="stylesheet" href="Ai_User/static/complaint.css">
  <style>
    body { background: white; padding: 20px; }
    .app-shell { max-width: none; }
  </style>
</head>
<body>
  <div style="background: #f0f8ff; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
    <h3>🧪 Standalone Test Form - Submit should show console logs + validation</h3>
    <p>Open F12 Console to see logs. Fill ALL required fields + add transaction + check declaration.</p>
  </div>

  <!-- Paste entire complaint.html form content here, but action="#" for standalone test -->
  <div class="app-shell">
    <!-- Full form from previous read_file -->
    <main class="main-card">
      <form id="complaintForm" method="POST" action="#" enctype="multipart/form-data" novalidate>
        <!-- All sections, buttons exactly as original -->
        <!-- ... (abbreviated for response, use full content from previous read) ... -->
        <section class="form-actions">
          <button type="button" id="resetFormBtn" class="btn btn-secondary">Reset Form</button>
          <div class="submit-area">
            <button type="submit" class="btn btn-submit" id="submitBtn">
              <span class="btn-text">TEST SUBMIT (Standalone)</span>
              <span class="spinner hidden">⏳</span>
            </button>
            <p class="submit-help">Check Console for logs. No backend.</p>
          </div>
        </section>
        <div id="messageBox" class="message-box hidden"></div>
      </form>
    </main>
  </div>

  <script src="Ai_User/static/script.js"></script>
  <script>
    console.log('Standalone test loaded');
    // Override submit to log
    document.getElementById('complaintForm').addEventListener('submit', (e) => {
      console.log('STANDALONE FORM SUBMITTED!');
      e.preventDefault();
      alert('Form reached submit! Backend would receive data now.');
    });
  </script>
</body>
</html>
