<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - National Cyber Crime Reporting Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/auth.css">
  <style>
    :root {
      --navy: #0a1628;
      --navy2: #112240;
      --blue: #1a56db;
      --blue2: #1e40af;
      --saffron: #FF6B00;
      --saffron2: #FF9500;
      --white: #ffffff;
      --muted: #94a3b8;
      --border: rgba(255,255,255,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
    }
  </style>
</head>
<body>

<!-- REGISTER POPUP MODAL -->
<div id="modal-overlay" style="display:flex;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(4px);">
  <div id="modal-box" style="background:#112240;border:1px solid rgba(26,86,219,0.35);border-radius:20px;width:420px;max-width:90vw;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,0.7);animation:slide-up 0.25s ease;">
    <div style="background:linear-gradient(135deg,rgba(26,86,219,0.25),rgba(255,107,0,0.1));padding:20px 24px 16px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:10px;">
        <svg width="28" height="34" viewBox="0 0 100 120" style="flex-shrink:0"><rect x="15" y="90" width="70" height="6" rx="2" fill="#C8922A"/><circle cx="50" cy="93" r="5" fill="none" stroke="#1a3a8f" stroke-width="1.5"/><circle cx="50" cy="93" r="1.5" fill="#1a3a8f"/><line x1="50" y1="88" x2="50" y2="98" stroke="#1a3a8f" stroke-width="1"/><line x1="45" y1="93" x2="55" y2="93" stroke="#1a3a8f" stroke-width="1"/><ellipse cx="50" cy="72" rx="16" ry="6" fill="#B8820A"/><ellipse cx="36" cy="68" rx="9" ry="7" fill="#C8922A"/><ellipse cx="36" cy="62" rx="6" ry="5" fill="#C8922A"/><ellipse cx="64" cy="68" rx="9" ry="7" fill="#C8922A"/><ellipse cx="64" cy="62" rx="6" ry="5" fill="#C8922A"/><ellipse cx="50" cy="65" rx="7" ry="8" fill="#C8922A"/></svg>
        <div id="modal-title" style="font-size:16px;font-weight:700;color:#fff;">📋 Create New Account</div>
      </div>
      <button onclick="closeModal()" style="background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer;line-height:1;">✕</button>
    </div>
    <div id="modal-body" style="padding:24px;">
      <!-- REGISTER FORM -->
      <form action="/register" method="POST" style="display:flex;flex-direction:column;gap:14px;">
  
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div>
            <label style="display:block;font-size:12px;color:#94a3b8;margin-bottom:6px;">First Name</label>
            <input type="text" name="first_name" required placeholder="First name" style="width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:14px;outline:none;" onfocus="this.style.borderColor='#1a56db'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'">
          </div>
          <div>
            <label style="display:block;font-size:12px;color:#94a3b8;margin-bottom:6px;">Last Name</label>
            <input type="text" name="last_name" required placeholder="Last name" style="width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:14px;outline:none;" onfocus="this.style.borderColor='#1a56db'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'">
          </div>
        </div>
        <div>
          <label style="display:block;font-size:12px;color:#94a3b8;margin-bottom:6px;">Email Address</label>
          <input type="email" name="email" required placeholder="your@email.com" style="width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:14px;outline:none;" onfocus="this.style.borderColor='#1a56db'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'">
        </div>
<div>
          <label style="display:block;font-size:12px;color:#94a3b8;margin-bottom:6px;">Phone Number</label>
          <input type="tel" name="phone" required placeholder="XXXXX XXXXX" style="width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:14px;outline:none;" onfocus="this.style.borderColor='#1a56db'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'">
        </div>
        <div>
          <label style="display:block;font-size:12px;color:#94a3b8;margin-bottom:6px;">State</label>
          <select name="state" required style="width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:14px;outline:none;cursor:pointer;" onfocus="this.style.borderColor='#1a56db'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'">
            <option value="" disabled selected style="color:#94a3b8;">Select your state</option>
            <option value="Andhra Pradesh">Andhra Pradesh</option>
            <option value="Arunachal Pradesh">Arunachal Pradesh</option>
            <option value="Assam">Assam</option>
            <option value="Bihar">Bihar</option>
            <option value="Chhattisgarh">Chhattisgarh</option>
            <option value="Goa">Goa</option>
            <option value="Gujarat">Gujarat</option>
            <option value="Haryana">Haryana</option>
            <option value="Himachal Pradesh">Himachal Pradesh</option>
            <option value="Jharkhand">Jharkhand</option>
            <option value="Karnataka">Karnataka</option>
            <option value="Kerala">Kerala</option>
            <option value="Madhya Pradesh">Madhya Pradesh</option>
            <option value="Maharashtra">Maharashtra</option>
            <option value="Manipur">Manipur</option>
            <option value="Meghalaya">Meghalaya</option>
            <option value="Mizoram">Mizoram</option>
            <option value="Nagaland">Nagaland</option>
            <option value="Odisha">Odisha</option>
            <option value="Punjab">Punjab</option>
            <option value="Rajasthan">Rajasthan</option>
            <option value="Sikkim">Sikkim</option>
            <option value="Tamil Nadu">Tamil Nadu</option>
            <option value="Telangana">Telangana</option>
            <option value="Tripura">Tripura</option>
            <option value="Uttar Pradesh">Uttar Pradesh</option>
            <option value="Uttarakhand">Uttarakhand</option>
            <option value="West Bengal">West Bengal</option>
            <option value="Andaman & Nicobar Islands">Andaman & Nicobar Islands</option>
            <option value="Chandigarh">Chandigarh</option>
            <option value="Dadra & Nagar Haveli and Daman & Diu">Dadra & Nagar Haveli and Daman & Diu</option>
            <option value="Delhi">Delhi</option>
            <option value="Jammu & Kashmir">Jammu & Kashmir</option>
            <option value="Ladakh">Ladakh</option>
            <option value="Lakshadweep">Lakshadweep</option>
            <option value="Puducherry">Puducherry</option>
          </select>
        </div>
<div>
          <label style="display:block;font-size:12px;color:#94a3b8;margin-bottom:6px;">Password</label>
          <input type="password" name="password" required placeholder="Min 8 characters" style="width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:14px;outline:none;" onfocus="this.style.borderColor='#1a56db'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'">
        </div>
        <label style="color:#94a3b8;font-size:12px;display:flex;align-items:start;gap:8px;cursor:pointer;line-height:1.5;">
          <input type="checkbox" required style="width:16px;height:16px;margin-top:2px;"> I agree to the <a href="#" style="color:#1a56db;text-decoration:none;">Terms & Privacy Policy</a>
        </label>
        <button type="submit" style="width:100%;padding:12px;background:linear-gradient(135deg,#ff6b00,#ff9500);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;">Create Account</button>
        {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}
        <div style="text-align:center;font-size:13px;color:#94a3b8;">
          Already have an account? <a href="/login" style="color:#ff6b00;text-decoration:none;font-weight:500;">Login here</a>
        </div>
        
      </form>
    </div>
  </div>  
</div>

<script>
function closeModal() {
  window.location.href = '/';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>

</body>
</html>
