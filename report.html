<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Check Suspicious Indicator</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#07111f;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:30px;
    }

    .container{
      width:100%;
      max-width:700px;
    }

    .card{
      background:#0f1f35;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:20px;
      padding:35px;
      box-shadow:0 0 40px rgba(0,150,255,0.15);
    }

    h1{
      font-size:32px;
      margin-bottom:10px;
      color:#4cc9f0;
    }

    .subtitle{
      color:#b6c2d2;
      margin-bottom:30px;
      line-height:1.6;
    }

    .input-group{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:10px;
      color:#dbe7f5;
      font-size:15px;
    }

    select,
    input{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#07111f;
      border:1px solid #23364f;
      color:white;
      font-size:16px;
      outline:none;
    }

    select:focus,
    input:focus{
      border-color:#0077ff;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:12px;
      background:linear-gradient(90deg,#0077ff,#00b4ff);
      color:white;
      font-size:17px;
      cursor:pointer;
      margin-top:10px;
      transition:0.3s;
    }

    button:hover{
      transform:translateY(-2px);
      opacity:0.95;
    }

    .result-box{
      margin-top:30px;
      background:#07111f;
      border:1px solid #24364f;
      border-radius:15px;
      padding:25px;
      display:none;
    }

    .match{
      color:#ff5e5e;
      font-size:24px;
      margin-bottom:15px;
    }

    .safe{
      color:#4ade80;
      font-size:24px;
      margin-bottom:15px;
    }

    .info{
      margin-bottom:10px;
      color:#d7e2f1;
    }

    .risk{
      display:inline-block;
      padding:6px 12px;
      border-radius:8px;
      background:#ff4d4d;
      margin-top:10px;
      font-size:14px;
    }

    .footer-note{
      margin-top:25px;
      color:#7f93ad;
      font-size:13px;
      line-height:1.6;
    }

  </style>
</head>
<body>

  <div class="container">

    <div class="card">

      <h1>Check Suspicious Indicator</h1>

      <p class="subtitle">
        Verify suspicious links, phone numbers, emails, APK hashes,
        UPI IDs, or bank accounts against investigation records.
      </p>

      <div class="input-group">
        <label>Indicator Type</label>

        <select id="type">
          <option value="">Select Type</option>
          <option value="phone">Phone Number</option>
          <option value="email">Email Address</option>
          <option value="url">Website / Link</option>
          <option value="upi">UPI ID</option>
          <option value="apk">APK SHA256 Hash</option>
          <option value="bank">Bank Account</option>
        </select>
      </div>

      <div class="input-group">
        <label>Enter Value</label>

        <input
          type="text"
          id="value"
          placeholder="Example: scam@fake.com"
        />
      </div>

      <button onclick="checkIndicator()">
        Analyze Indicator
      </button>

      <div class="result-box" id="resultBox"></div>

      <div class="footer-note">
        This portal checks indicators against authorized fraud intelligence
        databases. Results may not include newly emerging threats.
      </div>

    </div>

  </div>

  <script>

    const fakeDatabase = [

      {
        value:"9876543210",
        risk:"HIGH",
        caseType:"UPI Fraud",
        status:"Under Investigation",
        advice:"Avoid sending payments to this number."
      },

      {
        value:"siva@gmail.com",
        risk:"HIGH",
        caseType:"Phishing Email",
        status:"Confirmed Malicious",
        advice:"Do not click links or download attachments."
      },

      {
        value:"https://fakebank-login.com",
        risk:"CRITICAL",
        caseType:"Fake Banking Portal",
        status:"Blacklisted",
        advice:"This site is associated with credential theft."
        
      }

    ];

    function checkIndicator(){

      const value =
        document.getElementById("value").value.trim();

      const resultBox =
        document.getElementById("resultBox");

      const found =
        fakeDatabase.find(
          item => item.value.toLowerCase() === value.toLowerCase()
        );

      resultBox.style.display = "block";

      if(found){

        resultBox.innerHTML = `

          <div class="match">
            Match Found
          </div>

          <div class="info">
            <strong>Case Type:</strong>
            ${found.caseType}
          </div>

          <div class="info">
            <strong>Status:</strong>
            ${found.status}
          </div>

          <div class="info">
            <strong>Advice:</strong>
            ${found.advice}
          </div>

          <div class="risk">
            Risk Level: ${found.risk}
          </div>

        `;

      }else{

        resultBox.innerHTML = `

          <div class="safe">
            No Match Found
          </div>

          <div class="info">
            This indicator is not currently present
            in verified investigation records.
          </div>

          <div class="info">
            Stay cautious because new threats may
            not yet be reported.
          </div>

        `;
      }

    }

  </script>

</body>
</html>
